name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install Python dependencies
        run: |
          set -eux
          python -m pip install --upgrade pip setuptools wheel
          for i in 1 2 3; do
            python -m pip install -r requirements.txt && break || sleep 10
          done

      - name: Install Playwright system deps and browsers
        run: |
          set -eux
          for i in 1 2 3; do
            python -m playwright install --with-deps && break || sleep 10
          done

      - name: Run tests
        run: |
          python -m pytest -q